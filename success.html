<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aether — Order Successful</title>
  <link rel="stylesheet" href="shop.css">
  <style>
    .success-container {
      max-width: 500px;
      margin: 120px auto;
      text-align: center;
      color: white;
    }
    .success-container h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .success-container p {
      font-size: 18px;
      opacity: 0.8;
    }
    .order-id {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #7dd3fc;
    }
    .back-btn {
      margin-top: 40px;
      padding: 12px 24px;
      background: white;
      color: black;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="success-container">
    <h1>Order Successful</h1>
    <p>Thank you for shopping with Aether.</p>

    <p class="order-id" id="orderId">Loading...</p>

    <a href="index.html" class="back-btn">Return Home</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("orderId");

    document.getElementById("orderId").textContent =
      "Order ID: " + (id || "Unknown");
  </script>

</body>
</html>
